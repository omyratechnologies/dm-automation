name: Deploy to Production (EC2 — manual only; Render deploys from GitHub automatically)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 65.0.94.178
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting deployment..."
            
            # Load NVM and set up environment
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Navigate to project directory
            cd dm-automation || exit 1
            
            # Stash any local changes (e.g. ecosystem.config.js modifications)
            echo "🧹 Stashing local changes..."
            git stash || true
            
            # Pull latest changes
            echo "📥 Pulling latest code from GitHub..."
            git pull origin main
            
            # Install dependencies (deterministic)
            echo "📦 Installing dependencies..."
            npm ci --ignore-scripts
            npm run db:generate
            
            # Build the application
            echo "🔨 Building application..."
            npm run build
            
            # Apply database migrations
            echo "🗄️ Running database migrations..."
            npm run db:deploy
            
            # Restart PM2 processes from ecosystem file
            echo "🔄 Restarting PM2..."
            pm2 startOrReload ecosystem.config.js --update-env
            pm2 save
            
            echo "✅ Deployment completed successfully!"
            
            # Display running processes
            pm2 list

      - name: Check Deployment Status
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 65.0.94.178
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🔍 Checking deployment status..."
            
            # Load NVM and set up environment
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            pm2 status
            
            # Check if both processes are online
            if pm2 list | grep -q "gemai-web.*online" && pm2 list | grep -q "gemai-api.*online"; then
              echo "✅ Both services are running"
            else
              echo "❌ One or more services are not running"
              pm2 list
              exit 1
            fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "### Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed to:** 65.0.94.178" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit Message:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
